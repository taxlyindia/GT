<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>Signing you in…</title>
  <style>
    body { font-family: sans-serif; display:flex; align-items:center;
           justify-content:center; height:100vh; margin:0;
           background:#06111e; color:#c8900a; }
    .msg { text-align:center; }
    .spinner { width:32px; height:32px; border:3px solid rgba(200,144,10,.3);
               border-top-color:#c8900a; border-radius:50%;
               animation:spin .8s linear infinite; margin:0 auto 16px; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div class="msg">
    <div class="spinner"></div>
    <div>Signing you in to GoldTrader Pro…</div>
  </div>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var code  = params.get('code');
      var error = params.get('error');
      var redirectUri = window.location.origin + window.location.pathname;

      if (error) {
        if (window.opener && !window.opener.closed) {
          window.opener.handleGoogleCode(null, null, error);
        }
        window.close();
        return;
      }

      if (code) {
        if (window.opener && !window.opener.closed) {
          // Pass code + redirect_uri back to parent window
          window.opener.handleGoogleCode(code, redirectUri);
          window.close();
        } else {
          // Opened in same tab (popup blocked fallback)
          // Store in sessionStorage and redirect back
          sessionStorage.setItem('gt_google_code', code);
          sessionStorage.setItem('gt_google_redirect_uri', redirectUri);
          var returnUrl = sessionStorage.getItem('gt_google_redirect') || '/';
          window.location.href = returnUrl;
        }
      } else {
        if (window.opener && !window.opener.closed) {
          window.opener.handleGoogleCode(null, null, 'No authorization code received');
        }
        window.close();
      }
    })();
  </script>
</body>
</html>
